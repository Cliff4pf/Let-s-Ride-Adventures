<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RideHub</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Font Awesome for additional icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header-modern">
                <div class="logo-container">
                    <div class="logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z" />
                            <path d="M15 5.764v15" />
                            <path d="M9 3.236v15" />
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h2>RideHub</h2>
                        <span class="logo-subtitle">Premium Rides</span>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul id="sidebarMenu">
                    <!-- Dynamic nav items generated by JS based on role -->
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-status">
                    <div class="status-indicator online"></div>
                    <span>Online</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Wrapper -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar-modern">
                <div class="topbar-left">
                    <button class="menu-toggle-modern" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="page-info">
                        <h3 id="topbarTitle" style="margin: 0; color: var(--text-primary); font-weight: 600;">Dashboard</h3>
                        <span class="page-subtitle" id="pageSubtitle">Welcome back to RideHub</span>
                    </div>
                </div>

                <div class="topbar-right">
                    <div class="topbar-actions">
                        <button class="action-btn" id="notificationBtnTopbar" title="Notifications">
                            <i class="fas fa-bell"></i>
                            <span class="notification-badge" id="notificationBadge">0</span>
                        </button>
                        <button class="action-btn" id="messageBtnTopbar" title="Messages">
                            <i class="fas fa-envelope"></i>
                        </button>
                        <div style="position: relative;">
                            <button class="action-btn" id="settingsBtnTopbar" title="Settings">
                                <i class="fas fa-cog"></i>
                            </button>
                            <!-- Settings Dropdown Menu -->
                            <div id="settingsDropdown" style="display: none; position: absolute; top: 100%; right: 0; background: white; border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); min-width: 200px; z-index: 1000; margin-top: 0.5rem;">
                                <a href="#" id="profileSettingLink" style="display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; color: var(--text-primary); text-decoration: none; border-bottom: 1px solid var(--border-color); transition: background 0.2s;">
                                    <i class="fas fa-user" style="font-size: 0.9rem;"></i>
                                    <span>Edit Profile</span>
                                </a>
                                <button id="themeToggleBtn" style="width: 100%; text-align: left; display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: none; border: none; color: var(--text-primary); cursor: pointer; transition: background 0.2s; border-bottom: 1px solid var(--border-color);">
                                    <i class="fas fa-moon" style="font-size: 0.9rem;"></i>
                                    <span>Dark Mode</span>
                                </button>
                                <button id="logoutSettingBtn" style="width: 100%; text-align: left; display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: none; border: none; color: #ef4444; cursor: pointer; transition: background 0.2s; font-weight: 500;">
                                    <i class="fas fa-sign-out-alt" style="font-size: 0.9rem;"></i>
                                    <span>Logout</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="user-profile-modern">
                        <div class="user-info">
                            <div style="font-size: 0.875rem; font-weight: 600; color: var(--text-primary);" id="userName">User</div>
                            <div style="font-size: 0.75rem; color: var(--text-secondary);" id="userRole">Role</div>
                        </div>
                        <div class="avatar-modern" id="userAvatar">U</div>
                    </div>
                </div>
            </header>

            <!-- Dynamic Views Area -->
            <div class="content-area" id="dashboardContent">
                <!-- Content injected via JS depending on role -->
                <div style="text-align:center; padding: 2rem; color: var(--text-secondary);">
                    Loading dashboard...
                </div>
            </div>
        </main>
    </div>


    <!-- Mock Payment Modal -->
    <div id="paymentModal" class="modal-overlay" style="display: none; z-index: 2000;">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; border-bottom: none;">
                <h3>Secure Checkout</h3>
            </div>
            <div class="modal-body">
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Total Amount Due:
                    <strong>$50.00</strong>
                </p>

                <div id="paymentMethods"
                    style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem;">
                    <div
                        style="border: 2px solid var(--primary-color); padding: 1rem; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; color: var(--primary-color);">
                        💳 Card
                    </div>
                    <div
                        style="border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; flex: 1; cursor: pointer;">
                        📱 Mobile
                    </div>
                </div>

                <div id="paymentSpinner" style="display: none; margin: 2rem 0;">
                    <svg class="spinner" viewBox="0 0 50 50"
                        style="width: 40px; height: 40px; animation: rotate 2s linear infinite;">
                        <circle cx="25" cy="25" r="20" fill="none" stroke="var(--primary-color)" stroke-width="5"
                            stroke-dasharray="1, 200" stroke-dashoffset="0" stroke-linecap="round"
                            style="animation: dash 1.5s ease-in-out infinite;"></circle>
                    </svg>
                    <p style="margin-top: 1rem; color: var(--text-secondary);">Processing Payment...</p>
                </div>

                <div id="paymentSuccess" style="display: none; margin: 2rem 0; color: #10b981;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="margin: 0 auto; display: block;">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <p style="margin-top: 1rem; font-weight: bold; font-size: 1.2rem;">Payment Successful!</p>
                </div>

                <button id="confirmPayBtn" class="btn btn-primary" style="width: 100%;">Pay $50.00 Now</button>
                <button id="cancelPayBtn" class="btn btn-secondary"
                    style="width: 100%; margin-top: 0.5rem; background: transparent; color: var(--text-secondary);">Cancel
                    Payment</button>
            </div>
        </div>
    </div>
    <style>
        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 1, 200;
                stroke-dashoffset: 0;
            }

            50% {
                stroke-dasharray: 90, 200;
                stroke-dashoffset: -35px;
            }

            100% {
                stroke-dasharray: 90, 200;
                stroke-dashoffset: -124px;
            }
        }
    </style>

    <!-- Chart.js and App Logic -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        /* Settings dropdown styling */
        #settingsDropdown a:hover, 
        #settingsDropdown button:hover {
            background: var(--surface-hover) !important;
        }

        #settingsDropdown a, 
        #settingsDropdown button {
            transition: background 0.2s ease;
        }

        /* Action button styling in tables */
        .btn-secondary-modern {
            display: flex !important;
            align-items: center !important;
            gap: 0.4rem !important;
            justify-content: center !important;
        }

        .btn-primary-modern {
            display: flex !important;
            align-items: center !important;
            gap: 0.4rem !important;
            justify-content: center !important;
        }
    </style>
    
    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
