<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RideHub</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="color: var(--primary-color);">
                    <path
                        d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z" />
                    <path d="M15 5.764v15" />
                    <path d="M9 3.236v15" />
                </svg>
                <h2>RideHub</h2>
            </div>
            <nav class="sidebar-nav">
                <ul id="sidebarMenu">
                    <!-- Dynamic nav items generated by JS based on role -->
                </ul>
            </nav>
        </aside>

        <!-- Main Content Wrapper -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menuToggle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <h3 id="topbarTitle" style="display: none; font-weight: 500;">Dashboard</h3>
                </div>

                <div class="topbar-right">
                    <div class="user-profile">
                        <div style="text-align: right;">
                            <div style="font-size: 0.875rem; font-weight: 500;" id="userName">User</div>
                            <div style="font-size: 0.75rem; color: var(--text-secondary);" id="userRole">Role</div>
                        </div>
                        <div class="avatar" id="userAvatar">U</div>
                    </div>
                </div>
            </header>

            <!-- Dynamic Views Area -->
            <div class="content-area" id="dashboardContent">
                <!-- Content injected via JS depending on role -->
                <div style="text-align:center; padding: 2rem; color: var(--text-secondary);">
                    Loading dashboard...
                </div>
            </div>
        </main>
    </div>


    <!-- Mock Payment Modal -->
    <div id="paymentModal" class="modal-overlay" style="display: none; z-index: 2000;">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; border-bottom: none;">
                <h3>Secure Checkout</h3>
            </div>
            <div class="modal-body">
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Total Amount Due:
                    <strong>$50.00</strong>
                </p>

                <div id="paymentMethods"
                    style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem;">
                    <div
                        style="border: 2px solid var(--primary-color); padding: 1rem; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; color: var(--primary-color);">
                        💳 Card
                    </div>
                    <div
                        style="border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; flex: 1; cursor: pointer;">
                        📱 Mobile
                    </div>
                </div>

                <div id="paymentSpinner" style="display: none; margin: 2rem 0;">
                    <svg class="spinner" viewBox="0 0 50 50"
                        style="width: 40px; height: 40px; animation: rotate 2s linear infinite;">
                        <circle cx="25" cy="25" r="20" fill="none" stroke="var(--primary-color)" stroke-width="5"
                            stroke-dasharray="1, 200" stroke-dashoffset="0" stroke-linecap="round"
                            style="animation: dash 1.5s ease-in-out infinite;"></circle>
                    </svg>
                    <p style="margin-top: 1rem; color: var(--text-secondary);">Processing Payment...</p>
                </div>

                <div id="paymentSuccess" style="display: none; margin: 2rem 0; color: #10b981;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="margin: 0 auto; display: block;">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <p style="margin-top: 1rem; font-weight: bold; font-size: 1.2rem;">Payment Successful!</p>
                </div>

                <button id="confirmPayBtn" class="btn btn-primary" style="width: 100%;">Pay $50.00 Now</button>
                <button id="cancelPayBtn" class="btn btn-secondary"
                    style="width: 100%; margin-top: 0.5rem; background: transparent; color: var(--text-secondary);">Cancel
                    Payment</button>
            </div>
        </div>
    </div>
    <style>
        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 1, 200;
                stroke-dashoffset: 0;
            }

            50% {
                stroke-dasharray: 90, 200;
                stroke-dashoffset: -35px;
            }

            100% {
                stroke-dasharray: 90, 200;
                stroke-dashoffset: -124px;
            }
        }
    </style>

    <!-- Chart.js and App Logic -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
