<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RideHub</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="login-container">
        <!-- Hero Section -->
        <div class="hero-section animate-fade-in-up">
            <div style="position: relative; z-index: 1;">
                <h1 style="font-size: 3rem; font-weight: 700; margin-bottom: 1rem; background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                    Join RideHub
                </h1>
                <p style="font-size: 1.125rem; opacity: 0.9; max-width: 500px; margin: 0 auto;">
                    Start your journey with us. Create your account and experience seamless rides across Kenya.
                </p>
            </div>
        </div>

        <!-- Register Card -->
        <div class="card-modern animate-fade-in-up" style="max-width: 420px; width: 100%; margin: 0 auto;">
            <div style="padding: 2.5rem;">
                <div class="login-logo" style="text-align: center; margin-bottom: 2rem;">
                    <div style="width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; box-shadow: var(--shadow-lg);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z" />
                            <path d="M15 5.764v15" />
                            <path d="M9 3.236v15" />
                        </svg>
                    </div>
                    <h1 style="font-size: 1.875rem; font-weight: 700; color: var(--text-primary); margin: 0;">RideHub</h1>
                    <p style="color: var(--text-secondary); margin: 0.5rem 0 0; font-size: 0.875rem;">Create your Tourist account</p>
                </div>

                <!-- Social Registration -->
                <div style="margin-bottom: 2rem;">
                    <button class="social-btn" style="margin-bottom: 0.75rem;">
                        <i class="fab fa-google" style="color: #ea4335;"></i>
                        Sign up with Google
                    </button>
                    <button class="social-btn">
                        <i class="fab fa-facebook" style="color: #1877f2;"></i>
                        Sign up with Facebook
                    </button>
                </div>

                <div class="divider">or register with email</div>

                <form id="registerForm">
                    <div class="form-group-modern">
                        <label for="fullName">
                            <i class="fas fa-user" style="margin-right: 0.5rem; color: var(--text-muted);"></i>
                            Full Name
                        </label>
                        <input type="text" id="fullName" class="input-modern" required placeholder="John Doe">
                    </div>

                    <div class="form-group-modern">
                        <label for="email">
                            <i class="fas fa-envelope" style="margin-right: 0.5rem; color: var(--text-muted);"></i>
                            Email address
                        </label>
                        <input type="email" id="email" class="input-modern" required placeholder="name@example.com">
                    </div>

                    <div class="form-group-modern">
                        <label for="password">
                            <i class="fas fa-lock" style="margin-right: 0.5rem; color: var(--text-muted);"></i>
                            Password
                        </label>
                        <div style="position: relative;">
                            <input type="password" id="password" class="input-modern" required placeholder="••••••••" minlength="8">
                            <button type="button" id="togglePassword" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.25rem; display: block;">
                            Must be at least 8 characters long
                        </small>
                    </div>

                    <div class="form-group-modern">
                        <label class="checkbox-modern" style="margin-bottom: 0;">
                            <input type="checkbox" id="terms" required>
                            I agree to the <a href="#" style="color: var(--primary-color); text-decoration: underline;">Terms of Service</a> and <a href="#" style="color: var(--primary-color); text-decoration: underline;">Privacy Policy</a>
                        </label>
                    </div>

                    <div id="registerError" style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; display: none; padding: 0.75rem; background: var(--danger-light); border-radius: var(--radius-md); border-left: 4px solid var(--danger);">
                        <i class="fas fa-exclamation-triangle" style="margin-right: 0.5rem;"></i>
                        <span id="errorText"></span>
                    </div>

                    <button type="submit" class="btn-modern btn-primary-modern" id="registerBtn" style="width: 100%; margin-bottom: 1.5rem;">
                        <i class="fas fa-user-plus"></i>
                        Create Account
                    </button>
                </form>

                <div style="text-align: center; color: var(--text-secondary); font-size: 0.875rem;">
                    Already have an account?
                    <a href="index.html" style="color: var(--primary-color); font-weight: 600; margin-left: 0.25rem;">Sign in</a>
                </div>

                <!-- Trust Badges -->
                <div class="trust-badges">
                    <div class="trust-badge">
                        <i class="fas fa-shield-alt" style="color: var(--success);"></i>
                        Secure
                    </div>
                    <div class="trust-badge">
                        <i class="fas fa-users" style="color: var(--primary-color);"></i>
                        10K+ Users
                    </div>
                    <div class="trust-badge">
                        <i class="fas fa-star" style="color: var(--warning);"></i>
                        4.8 Rating
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script type="module" src="js/register.js"></script>
    <script>
        // Password toggle functionality
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('password');
            const icon = this.querySelector('i');

            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>
</body>

</html>
