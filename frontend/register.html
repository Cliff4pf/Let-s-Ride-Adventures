<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RideHub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z" />
                    <path d="M15 5.764v15" />
                    <path d="M9 3.236v15" />
                </svg>
                <h1>RideHub</h1>
            </div>

            <p class="text-secondary" style="margin-bottom: 2rem;">Create a Tourist Account</p>

            <form id="registerForm">
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="John Doe">
                </div>

                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>

                <div class="input-group" style="margin-bottom: 0.5rem;">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <div id="registerError"
                    style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; display: none;"></div>

                <button type="submit" class="btn btn-primary" id="registerBtn"
                    style="width: 100%; padding: 0.75rem; font-size: 1rem; margin-top: 1rem;">Create Account</button>
            </form>

            <div style="margin-top: 2rem; font-size: 0.875rem; color: var(--text-secondary);">
                Already have an account? <a href="index.html"
                    style="color: var(--primary-color); font-weight: 500;">Sign In</a>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script type="module" src="js/register.js"></script>
</body>

</html>
