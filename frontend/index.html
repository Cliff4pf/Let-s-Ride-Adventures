<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - RideHub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z" />
                    <path d="M15 5.764v15" />
                    <path d="M9 3.236v15" />
                </svg>
                <h1>RideHub</h1>
            </div>

            <p class="text-secondary" style="margin-bottom: 2rem;">Sign in to your account</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="input-group" style="margin-bottom: 0.5rem;">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div id="loginError"
                    style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; display: none;">
                    Invalid email or password.
                </div>

                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary-color); font-weight: 500;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
            </form>

            <div style="margin-top: 2rem; font-size: 0.875rem; color: var(--text-secondary);">
                Don't have an account? <a href="register.html"
                    style="color: var(--primary-color); font-weight: 500;">Register as
                    Tourist</a>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script type="module" src="js/login.js"></script>
</body>

</html>
